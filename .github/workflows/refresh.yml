name: Refresh from Google Sheet

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Install rclone
        run: |
          curl -sL https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Pull Sheet as CSV
        run: rclone copy gdrive:nia-coverage-master.csv data/ --drive-export-formats csv

      - name: Rebuild JSON from CSV
        run: npm run rebuild

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nia-coverage-master.csv mobile-locations.json clinic-locations.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh data from Google Sheet"
          git push
