name: Rebuild location data

on:
  push:
    paths:
      - "data/nia-coverage-master.csv"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Geocode rows missing coordinates
        run: node scripts/geocode-missing.js

      - name: Rebuild JSON from CSV
        run: npm run rebuild

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nia-coverage-master.csv mobile-locations.json clinic-locations.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Rebuild location data"
          git push
