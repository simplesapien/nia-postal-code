name: Refresh from Google Sheet

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Pull latest CSV from published Google Sheet
        run: |
          curl -sL "https://docs.google.com/spreadsheets/d/${{ vars.SHEET_ID }}/export?format=csv" -o data/nia-coverage-master.csv

      - name: Rebuild JSON from CSV
        run: npm run rebuild

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nia-coverage-master.csv mobile-locations.json clinic-locations.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh data from Google Sheet"
          git push
