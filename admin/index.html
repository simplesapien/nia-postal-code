<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NiaHealth – Location Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #0d9488;
      --teal-dark:   #0f766e;
      --teal-dim:    rgba(13,148,136,0.12);
      --teal-bg:     #f0fdfa;
      --teal-border: #5eead4;
      --red:         #9f1239;
      --red-bg:      #fff1f2;
      --red-border:  #fb7185;
      --ink:         #0c1a14;
      --ink-mid:     #374151;
      --muted:       #6b7280;
      --line:        #e5e7eb;
      --soft:        #f3f4f6;
      --white:       #ffffff;
      --page-bg:     #f7f9f8;
    }

    html, body {
      height: 100%;
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--ink);
    }

    /* ── LOGIN ── */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 40px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .login-card h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .login-card input {
      width: 100%;
      padding: 11px 14px;
      font-size: 0.9375rem;
      font-family: 'Instrument Sans', sans-serif;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      outline: none;
      background: var(--soft);
      margin-bottom: 12px;
      transition: border-color .15s, box-shadow .15s;
    }

    .login-card input:focus {
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }

    .login-error {
      font-size: 0.8rem;
      color: var(--red);
      margin-bottom: 10px;
      display: none;
    }

    .login-error.visible { display: block; }

    /* ── SHARED BUTTON ── */
    .btn {
      padding: 10px 18px;
      background: var(--teal);
      color: white;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    .btn:hover:not(:disabled) { background: var(--teal-dark); transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: 8px; }

    .btn-outline {
      background: var(--white);
      color: var(--teal-dark);
      border: 1.5px solid var(--teal-border);
    }
    .btn-outline:hover:not(:disabled) { background: var(--teal-bg); }

    .btn-danger {
      background: var(--white);
      color: var(--red);
      border: 1.5px solid var(--red-border);
    }
    .btn-danger:hover:not(:disabled) { background: var(--red-bg); }

    /* ── APP SHELL ── */
    .app { display: none; flex-direction: column; min-height: 100vh; }
    .app.visible { display: flex; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .topbar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--teal-border));
    }

    .topbar-title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 500;
      flex: 1;
    }

    .topbar-title span { color: var(--muted); font-weight: 300; }

    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .status {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--soft);
    }

    .status.saving { color: var(--teal-dark); background: var(--teal-bg); }
    .status.error { color: var(--red); background: var(--red-bg); }
    .status.success { color: var(--teal-dark); background: var(--teal-bg); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .toolbar-search {
      flex: 1;
      max-width: 320px;
      padding: 8px 12px;
      font-size: 0.8125rem;
      font-family: 'Instrument Sans', sans-serif;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      outline: none;
      background: var(--soft);
    }

    .toolbar-search:focus {
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }

    .toolbar-count {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── TABLE ── */
    .table-wrap {
      flex: 1;
      overflow: auto;
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th {
      background: var(--soft);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      user-select: none;
    }

    td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    tr:hover td { background: var(--teal-bg); }

    tr.row-new td { background: #ecfdf5; }
    tr.row-dirty td { background: #fffbeb; }
    tr.row-bad-coords td { background: var(--red-bg); }

    td input, td select {
      width: 100%;
      padding: 5px 6px;
      font-size: 0.8125rem;
      font-family: 'Instrument Sans', sans-serif;
      border: 1px solid transparent;
      border-radius: 4px;
      outline: none;
      background: transparent;
    }

    td input:focus, td select:focus {
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 2px var(--teal-dim);
    }

    td input.coord { width: 110px; font-variant-numeric: tabular-nums; }

    td .row-actions {
      display: flex;
      gap: 4px;
      white-space: nowrap;
    }

    .icon-btn {
      padding: 4px 6px;
      background: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--muted);
      transition: all .12s;
    }

    .icon-btn:hover { background: var(--soft); color: var(--ink); }
    .icon-btn.danger:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

    /* ── SECTION ROWS ── */
    tr.section-row td {
      background: var(--soft);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 10px 12px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: white;
      background: var(--teal-dark);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      opacity: 0;
      transform: translateY(10px);
      transition: all .25s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.error { background: var(--red); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-card">
      <h1>Location Admin</h1>
      <p>Enter the admin password to manage NiaHealth service locations.</p>
      <input type="password" id="token-input" placeholder="Admin password" autocomplete="off" />
      <div class="login-error" id="login-error">Invalid password. Please try again.</div>
      <button class="btn" id="login-btn" style="width:100%">Sign in</button>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app">
    <div class="topbar" style="position:relative">
      <div class="topbar-title">Location Admin <span>· NiaHealth</span></div>
      <div class="topbar-actions">
        <span class="status" id="status"></span>
        <button class="btn btn-sm btn-outline" id="geocode-btn" title="Geocode rows with missing or bad coordinates">Geocode empty</button>
        <button class="btn btn-sm" id="save-btn">Save &amp; publish</button>
        <button class="btn btn-sm btn-danger" id="logout-btn">Logout</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="toolbar-search" id="search-input" placeholder="Filter by name, city, province..." />
      <button class="btn btn-sm btn-outline" id="add-mobile-btn">+ Mobile</button>
      <button class="btn btn-sm btn-outline" id="add-clinic-btn">+ Clinic</button>
      <span class="toolbar-count" id="row-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Section</th>
            <th>Name</th>
            <th>Address</th>
            <th>City</th>
            <th>Province</th>
            <th>Postal Code</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
