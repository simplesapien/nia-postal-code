<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NiaHealth – Service Area Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #1A1A1A;
      --ink-mid:     #4A4A4A;
      --muted:       #777;
      --gold:        #BFA15E;
      --maroon:      #5C2434;
      --maroon-dark: #3D1820;
      --green:       #3B8C5A;
      --green-light: #E8F5EC;
      --orange:      #D94F30;
      --white:       #FFFFFF;
      --cream:       #FAF7F2;
      --cream-dark:  #F0EDE6;
      --line:        #E0DCD4;
      --r:           12px;
      --r-lg:        16px;
      --r-pill:      100px;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Instrument Sans', system-ui, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── FULL-SCREEN MAP ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .leaflet-tile-pane {
      filter: sepia(0.12) saturate(0.82) brightness(1.04);
    }

    /* ── SEARCH OVERLAY ── */
    .search-overlay {
      position: fixed;
      z-index: 1000;
      top: 32%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: top 0.4s ease, transform 0.4s ease;
      padding: 40px 20px;
      border-radius: 24px;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.15) 65%, transparent 90%);
    }

    body.searched .search-overlay {
      top: 16px;
      transform: translate(-50%, 0);
      background: none;
      padding: 0;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 24px;
      transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
      max-height: 300px;
      overflow: hidden;
    }

    body.searched .hero {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      pointer-events: none;
    }

    .hero-heading {
      font-family: 'Fraunces', serif;
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 12px;
      text-shadow: 0 1px 6px rgba(255,255,255,0.8);
    }

    .hero-heading em {
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
    }

    .hero-sub {
      font-size: 0.95rem;
      color: var(--ink-mid);
      line-height: 1.5;
      max-width: 420px;
      margin: 0 auto;
      text-shadow: 0 1px 4px rgba(255,255,255,0.9);
    }

    /* ── SEARCH BAR ── */
    .search-bar {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 520px;
      background: var(--white);
      border: 2px solid var(--ink);
      border-radius: var(--r-pill);
      padding: 5px 5px 5px 18px;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .search-bar-icon {
      display: flex;
      flex-shrink: 0;
      color: var(--muted);
    }

    .search-bar-icon svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.9375rem;
      font-family: 'Instrument Sans', sans-serif;
      color: var(--ink);
      background: transparent;
      min-width: 0;
    }

    .search-bar input::placeholder { color: #AAA; }

    .search-bar { position: relative; }

    .autocomplete-list {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--white);
      border-radius: var(--r);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      list-style: none;
    }

    .autocomplete-list.visible { display: block; }

    .autocomplete-list li {
      padding: 10px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--ink);
      border-bottom: 1px solid var(--line);
    }

    .autocomplete-list li:last-child { border-bottom: none; }
    .autocomplete-list li:hover, .autocomplete-list li.active { background: var(--cream); }

    .autocomplete-list li .ac-prov {
      color: var(--muted);
      font-size: 0.75rem;
      margin-left: 4px;
    }

    .clear-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border: none;
      background: var(--line);
      border-radius: 50%;
      font-size: 0.85rem;
      color: var(--ink-mid);
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      line-height: 1;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #ccc; }
    .clear-btn.visible { display: flex; }

    .check-btn {
      flex-shrink: 0;
      padding: 10px 22px;
      background: var(--ink);
      color: white;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--r-pill);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .check-btn:hover:not(:disabled) { background: #333; }
    .check-btn:active:not(:disabled) { transform: scale(0.97); }
    .check-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .check-btn .arrow { font-size: 1.1em; }

    /* ── ERROR ── */
    .error-box {
      width: 100%;
      max-width: 520px;
      padding: 10px 18px;
      background: #FFF1F0;
      border: 1px solid #FFCCC7;
      border-radius: var(--r);
      font-size: 0.8rem;
      color: #CF1322;
      display: none;
      text-align: center;
      margin-top: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .error-box.visible { display: block; }

    /* ── LOADING ── */
    .loading-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      z-index: 2000;
      display: none;
    }

    .loading-bar.visible { display: block; }

    .loading-fill {
      height: 100%;
      width: 30%;
      background: var(--maroon);
      border-radius: 2px;
      animation: load 1.4s ease-in-out infinite;
    }

    @keyframes load {
      0%   { transform: translateX(-100%); width: 30%; }
      50%  { width: 60%; }
      100% { transform: translateX(400%); width: 30%; }
    }

    /* ── RESULTS CARD ── */
    .results-card {
      position: fixed;
      z-index: 1000;
      left: 16px;
      top: 72px;
      bottom: 16px;
      width: 420px;
      background: var(--white);
      border-radius: var(--r-lg);
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: none;
      flex-direction: column;
      overflow: hidden;
      animation: slideIn 0.35s ease;
    }

    .results-card.visible { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Banner */
    .rc-banner {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .rc-banner.in-area {
      background: var(--maroon-dark);
      color: white;
    }

    .rc-banner.extended {
      background: #5C3D10;
      color: white;
    }

    .rc-banner-badge {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .rc-banner.in-area .rc-banner-badge { background: var(--green); }
    .rc-banner.extended .rc-banner-badge { background: #D4A843; }

    .rc-banner-badge svg {
      width: 20px; height: 20px;
      stroke: white; fill: none;
      stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .rc-banner-text h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 2px;
    }

    .rc-banner-text p {
      font-size: 0.75rem;
      opacity: 0.75;
    }

    /* Tabs */
    .rc-tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      background: var(--cream);
    }

    .rc-tab {
      flex: 1;
      padding: 11px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      text-align: center;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: 'Instrument Sans', sans-serif;
    }

    .rc-tab:hover { color: var(--ink); }
    .rc-tab.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
      font-weight: 600;
    }

    /* Scrollable content */
    .rc-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
    }

    /* Section headers */
    .rc-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 10px;
    }

    .rc-section-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .rc-section-icon {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* Mobile availability section */
    .rc-mobile-section { margin-bottom: 20px; }

    .rc-mobile-card {
      background: var(--cream);
      border-radius: var(--r);
      padding: 14px 16px;
    }

    .rc-mobile-card h3 {
      font-family: 'Fraunces', serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--ink);
    }

    .rc-mobile-card p {
      font-size: 0.8rem;
      color: var(--ink-mid);
      line-height: 1.55;
    }

    /* Clinic list section */
    .rc-clinic-section { margin-bottom: 12px; }

    .rc-clinic-list {
      display: flex;
      flex-direction: column;
    }

    .rc-clinic-item {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 0 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }

    .rc-clinic-item:last-child { border-bottom: none; }

    .rc-clinic-rank {
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.3;
    }

    .rc-clinic-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .rc-clinic-addr {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.3;
    }

    .rc-clinic-dist {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--ink);
      white-space: nowrap;
      line-height: 1.3;
    }

    .rc-clinic-dist span {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--muted);
    }

    .rc-clinic-dist.dist-close { color: var(--green); }
    .rc-clinic-dist.dist-close span { color: var(--green); }
    .rc-clinic-dist.dist-mid { color: #B8860B; }
    .rc-clinic-dist.dist-mid span { color: #B8860B; }
    .rc-clinic-dist.dist-far { color: var(--orange); }
    .rc-clinic-dist.dist-far span { color: var(--orange); }

    /* Out-of-area card */
    .rc-out-of-area { padding: 24px 20px; }

    .rc-oor-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 10px;
    }

    .rc-oor-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
    }

    .rc-oor-heading {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .rc-oor-heading em {
      font-style: italic;
      font-weight: 300;
    }

    .rc-oor-sub {
      font-size: 0.85rem;
      color: var(--ink-mid);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .rc-oor-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .rc-oor-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--line);
      border-radius: var(--r);
      font-size: 0.85rem;
      font-family: 'Instrument Sans', sans-serif;
      outline: none;
      color: var(--ink);
      background: var(--cream);
    }

    .rc-oor-form input::placeholder { color: #AAA; }
    .rc-oor-form input:focus { border-color: var(--ink); background: var(--white); }

    .rc-oor-form button {
      padding: 10px 18px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Instrument Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .rc-oor-form button:hover { background: #333; }

    /* Disclaimer */
    .rc-disclaimer {
      padding-top: 14px;
      border-top: 1px solid var(--line);
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .rc-disclaimer a {
      color: var(--ink);
      text-decoration: underline;
    }

    /* ── SPIN ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.7s linear infinite; }

    /* ── MARKER STYLES ── */
    .marker-label {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      text-shadow: 0 0 4px rgba(255,255,255,1), 0 0 8px rgba(255,255,255,0.8);
    }

    .numbered-pin {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--maroon);
      color: white;
      font-family: 'Fraunces', serif;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      border: 2px solid white;
    }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
    }

    .leaflet-control-zoom a {
      border-radius: 8px !important;
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 16px !important;
      background: var(--white) !important;
      color: var(--ink) !important;
    }

    .leaflet-control-zoom a:first-child { border-radius: 8px 8px 0 0 !important; }
    .leaflet-control-zoom a:last-child  { border-radius: 0 0 8px 8px !important; }

    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255,255,255,0.7) !important;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .search-overlay {
        top: 38%;
        width: 92%;
        padding: 0 4px;
      }

      .hero-heading { font-size: 2.2rem; }
      .hero-sub { font-size: 0.85rem; max-width: 300px; }
      .hero { margin-bottom: 16px; }

      .search-bar { padding: 4px 4px 4px 14px; }
      .search-bar input { font-size: 0.875rem; }
      .check-btn { padding: 9px 16px; font-size: 0.8125rem; }
      .check-btn .arrow { display: none; }

      body.searched .search-overlay {
        top: 10px;
        width: 94%;
      }

      .error-box { font-size: 0.75rem; }

      .results-card {
        left: 0;
        right: 0;
        top: auto;
        bottom: 0;
        width: 100%;
        max-height: 58vh;
        border-radius: var(--r-lg) var(--r-lg) 0 0;
        animation: slideUp 0.35s ease;
        transition: max-height 0.3s ease;
      }

      .results-card.collapsed { max-height: 72px; overflow: hidden; }

      .rc-drag-handle {
        display: flex;
        justify-content: center;
        padding: 8px 0 4px;
        cursor: pointer;
        flex-shrink: 0;
      }

      .rc-drag-handle::after {
        content: "";
        width: 36px; height: 4px;
        border-radius: 2px;
        background: var(--line);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(100%); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .rc-banner { padding: 14px 16px; gap: 12px; }
      .rc-banner-badge { width: 34px; height: 34px; }
      .rc-banner-badge svg { width: 18px; height: 18px; }
      .rc-banner-text h2 { font-size: 1rem; }
      .rc-banner-text p { font-size: 0.7rem; }
      .rc-content { padding: 14px 16px; }
      .rc-tab { font-size: 0.75rem; padding: 9px 8px; }
      .rc-mobile-card { padding: 12px 14px; }
      .rc-mobile-card h3 { font-size: 0.9rem; }
      .rc-mobile-card p { font-size: 0.78rem; }
      .rc-clinic-name { font-size: 0.8rem; }
      .rc-clinic-addr { font-size: 0.68rem; }
      .rc-clinic-dist { font-size: 1rem; }
      .rc-oor-heading { font-size: 1.3rem; }
      .rc-oor-sub { font-size: 0.8rem; }
      .rc-out-of-area { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- Full-screen map -->
  <div id="map"></div>

  <!-- Search overlay (centered → moves to top after search) -->
  <div class="search-overlay" id="search-overlay">
    <div class="hero" id="hero">
      <h1 class="hero-heading">Are we near <em>you?</em></h1>
      <p class="hero-sub">Check if a mobile phlebotomist can reach you, or find the closest in&#8209;clinic lab.</p>
    </div>
    <div class="search-bar" id="search-bar">
      <span class="search-bar-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input
        type="text"
        id="address"
        placeholder="Address, city, or postal code"
        autocomplete="off"
        spellcheck="false"
        disabled
      />
      <button type="button" id="clear-btn" class="clear-btn" aria-label="Clear search">&times;</button>
      <button type="button" id="submit-btn" class="check-btn" disabled>
        Check <span class="arrow">&rarr;</span>
      </button>
      <ul class="autocomplete-list" id="autocomplete-list"></ul>
    </div>
    <div class="error-box" id="error"></div>
  </div>

  <!-- Loading bar (visible on boot until data loads) -->
  <div class="loading-bar visible" id="loading-bar"><div class="loading-fill"></div></div>

  <!-- Results card -->
  <div class="results-card" id="results-card"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
